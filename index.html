<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenya Splitter - Realtime Safari Tracker</title>
    <!-- Tailwind CSS for UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDKs (Web Compatible CDN imports) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-24">

    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;

      // --- YOUR FIREBASE CONFIGURATION ---
      const firebaseConfig = {
        apiKey: "AIzaSyBMo8yhuKVPLeu8fgVCengdVYyM2x74ylM",
        authDomain: "kenyakash.firebaseapp.com",
        projectId: "kenyakash",
        storageBucket: "kenyakash.firebasestorage.app",
        messagingSenderId: "53855325790",
        appId: "1:53855325790:web:a04b0904604eb335892ecf"
      };

      // Initialize Firebase (Compat Mode)
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      // --- YOUR CUSTOM FAMILY ROSTER ---
      const INITIAL_FAMILIES = [
        { 
          id: 'fam-1', 
          name: 'Infeld SJ', 
          color: 'from-blue-500 to-indigo-600', 
          text: 'text-blue-600',
          bg: 'bg-blue-50',
          border: 'border-blue-100',
          members: [
            { id: 'm-1-1', name: 'Liza' },
            { id: 'm-1-2', name: 'Marc' },
            { id: 'm-1-3', name: 'Ainsley' },
            { id: 'm-1-4', name: 'Logan' }
          ]
        },
        { 
          id: 'fam-2', 
          name: 'Infeld SC', 
          color: 'from-emerald-500 to-teal-600', 
          text: 'text-emerald-600',
          bg: 'bg-emerald-50',
          border: 'border-emerald-100',
          members: [
            { id: 'm-2-1', name: 'Samantha' },
            { id: 'm-2-2', name: 'Garrick' },
            { id: 'm-2-3', name: 'Theo' },
            { id: 'm-2-4', name: 'Kyffan' }
          ]
        },
        { 
          id: 'fam-3', 
          name: 'Infeld TH', 
          color: 'from-amber-500 to-orange-600', 
          text: 'text-amber-600',
          bg: 'bg-amber-50',
          border: 'border-amber-100',
          members: [
            { id: 'm-3-1', name: 'Loren' },
            { id: 'm-3-2', name: 'Arriya' },
            { id: 'm-3-3', name: 'Lily' }
          ]
        },
      ];

      function App() {
        // Core states
        const [expenses, setExpenses] = useState([]);
        const [isLoading, setIsLoading] = useState(true);
        const [exchangeRate, setExchangeRate] = useState(() => {
          const saved = localStorage.getItem('kenya_splitter_rate_v5');
          return saved ? parseFloat(saved) : 129.31; 
        });

        const [description, setDescription] = useState('');
        const [activityDate, setActivityDate] = useState(() => new Date().toISOString().split('T')[0]);
        const [splitMode, setSplitMode] = useState('equal'); 
        const [amount, setAmount] = useState(''); 
        const [currency, setCurrency] = useState('USD'); 
        const [notes, setNotes] = useState(''); 
        const [paidByMemberId, setPaidByMemberId] = useState('m-1-1'); 
        const [coveredMemberIds, setCoveredMemberIds] = useState([]); 
        const [customAmounts, setCustomAmounts] = useState({}); 
        const [editingExpenseId, setEditingExpenseId] = useState(null);

        const [activeTab, setActiveTab] = useState('expenses'); 
        const [toastMessage, setToastMessage] = useState(null);

        const allMembers = useMemo(() => {
          return INITIAL_FAMILIES.flatMap(f => f.members.map(m => ({ ...m, familyId: f.id, familyName: f.name, color: f.text })));
        }, []);

        // Realtime Firestore Listener
        useEffect(() => {
          const unsubscribe = db.collection('expenses')
            .orderBy('createdAt', 'desc')
            .onSnapshot((snapshot) => {
              const loadedExpenses = [];
              snapshot.forEach((doc) => {
                loadedExpenses.push({ id: doc.id, ...doc.data() });
              });
              setExpenses(loadedExpenses);
              setIsLoading(false);
            }, (error) => {
              console.error("Firestore loading error: ", error);
              showToast("Database connection error!");
              setIsLoading(false);
            });

          return () => unsubscribe();
        }, []);

        // Persist local custom rates
        useEffect(() => {
          localStorage.setItem('kenya_splitter_rate_v5', exchangeRate.toString());
        }, [exchangeRate]);

        // Default splits to include everyone initially
        useEffect(() => {
          if (coveredMemberIds.length === 0) {
            setCoveredMemberIds(allMembers.map(m => m.id));
          }
        }, [allMembers]);

        const showToast = (msg) => {
          setToastMessage(msg);
          setTimeout(() => setToastMessage(null), 3000);
        };

        const fetchLiveExchangeRate = async () => {
          try {
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            if (res.ok) {
              const data = await res.json();
              if (data.rates && data.rates.KES) {
                setExchangeRate(parseFloat(data.rates.KES));
                showToast(`Live exchange rate updated: 1 USD = ${data.rates.KES.toFixed(2)} KES`);
              }
            }
          } catch (err) {
            showToast("Couldn't fetch live rate.");
          }
        };

        const totalCustomSum = useMemo(() => {
          return Object.values(customAmounts).reduce((acc, val) => {
            const parsed = parseFloat(val);
            return acc + (isNaN(parsed) ? 0 : parsed);
          }, 0);
        }, [customAmounts]);

        const handleSubmitExpense = async (e) => {
          e.preventDefault();
          if (!description.trim()) {
            showToast("Please enter a description.");
            return;
          }

          let finalOriginalAmount = 0;
          let finalUSDValue = 0;
          let finalSplits = {}; 

          if (splitMode === 'equal') {
            const inputAmt = parseFloat(amount);
            if (isNaN(inputAmt) || inputAmt <= 0) {
              showToast("Please enter a valid amount.");
              return;
            }
            if (coveredMemberIds.length === 0) {
              showToast("Please select at least one traveler.");
              return;
            }
            
            finalOriginalAmount = inputAmt;
            finalUSDValue = currency === 'USD' ? inputAmt : inputAmt / exchangeRate;
            
            const share = finalOriginalAmount / coveredMemberIds.length;
            coveredMemberIds.forEach(id => {
              finalSplits[id] = share;
            });
          } else {
            if (totalCustomSum <= 0) {
              showToast("Please enter individual amounts.");
              return;
            }
            
            finalOriginalAmount = totalCustomSum;
            finalUSDValue = currency === 'USD' ? totalCustomSum : totalCustomSum / exchangeRate;
            
            Object.entries(customAmounts).forEach(([id, val]) => {
              const parsed = parseFloat(val);
              if (parsed > 0) finalSplits[id] = parsed;
            });
          }

          const expensePayload = {
            description: description.trim(),
            activityDate,
            splitMode,
            notes: notes.trim(),
            originalAmount: finalOriginalAmount,
            originalCurrency: currency,
            exchangeRateSnapshot: exchangeRate,
            amount: finalUSDValue, 
            paidByMemberId, 
            splits: finalSplits,
            createdAt: editingExpenseId ? expenses.find(x => x.id === editingExpenseId).createdAt : new Date().toISOString()
          };

          try {
            if (editingExpenseId) {
              await db.collection('expenses').doc(editingExpenseId).set(expensePayload);
              showToast("Expense updated!");
              setEditingExpenseId(null);
            } else {
              await db.collection('expenses').add(expensePayload);
              showToast("Expense logged!");
            }

            // Reset inputs
            setDescription('');
            setAmount('');
            setNotes('');
            setCustomAmounts({});
            setCoveredMemberIds(allMembers.map(m => m.id)); 
            setActivityDate(new Date().toISOString().split('T')[0]);
          } catch (error) {
            console.error("Error saving: ", error);
            showToast("Error communicating with Database.");
          }
        };

        const handleEditClick = (expense) => {
          setEditingExpenseId(expense.id);
          setDescription(expense.description);
          setActivityDate(expense.activityDate);
          setCurrency(expense.originalCurrency || 'USD');
          setPaidByMemberId(expense.paidByMemberId);
          setNotes(expense.notes || '');
          
          const mode = expense.splitMode || 'equal';
          setSplitMode(mode);

          if (mode === 'equal') {
            setAmount(expense.originalAmount);
            setCoveredMemberIds(expense.splits ? Object.keys(expense.splits) : []);
            setCustomAmounts({});
          } else {
            setAmount('');
            const loadedCustom = {};
            Object.entries(expense.splits || {}).forEach(([mId, val]) => {
              loadedCustom[mId] = val.toString();
            });
            setCustomAmounts(loadedCustom);
          }

          setActiveTab('expenses');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const handleDeleteExpense = async (id) => {
          try {
            await db.collection('expenses').doc(id).delete();
            showToast("Expense deleted.");
            if (editingExpenseId === id) {
              setEditingExpenseId(null);
              setDescription('');
              setAmount('');
              setNotes('');
              setCustomAmounts({});
            }
          } catch (error) {
            showToast("Error deleting item.");
          }
        };

        const calculations = useMemo(() => {
          const memberSummary = {};
          const familySummary = {};

          allMembers.forEach(m => {
            memberSummary[m.id] = {
              id: m.id, name: m.name, familyId: m.familyId, familyName: m.familyName, color: m.color, paid: 0, owed: 0, net: 0
            };
          });

          INITIAL_FAMILIES.forEach(f => {
            familySummary[f.id] = {
              id: f.id, name: f.name, color: f.color, text: f.text, bg: f.bg, border: f.border, paid: 0, owed: 0, net: 0
            };
          });

          expenses.forEach(exp => {
            const payerId = exp.paidByMemberId;
            const amtUSD = exp.amount; 
            const isOriginalUSD = exp.originalCurrency === 'USD';
            const snapRate = exp.exchangeRateSnapshot || exchangeRate;

            if (memberSummary[payerId]) {
              memberSummary[payerId].paid += amtUSD;
            }

            if (exp.splits) {
              Object.entries(exp.splits).forEach(([mId, origShare]) => {
                if (memberSummary[mId]) {
                  const shareInUSD = isOriginalUSD ? origShare : origShare / snapRate;
                  memberSummary[mId].owed += shareInUSD;
                }
              });
            }
          });

          Object.values(memberSummary).forEach(m => {
            m.net = m.paid - m.owed;
            const fId = m.familyId;
            if (familySummary[fId]) {
              familySummary[fId].paid += m.paid;
              familySummary[fId].owed += m.owed;
              familySummary[fId].net += m.net;
            }
          });

          const familySummaryList = Object.values(familySummary);
          const debtors = [];
          const creditors = [];

          familySummaryList.forEach(f => {
            if (f.net < -0.01) debtors.push({ ...f, remaining: Math.abs(f.net) });
            else if (f.net > 0.01) creditors.push({ ...f, remaining: f.net });
          });

          debtors.sort((a, b) => b.remaining - a.remaining);
          creditors.sort((a, b) => b.remaining - a.remaining);

          const transfers = [];
          let dIndex = 0;
          let cIndex = 0;

          while (dIndex < debtors.length && cIndex < creditors.length) {
            const debtor = debtors[dIndex];
            const creditor = creditors[cIndex];
            const amountToTransfer = Math.min(debtor.remaining, creditor.remaining);
            
            if (amountToTransfer > 0.01) {
              transfers.push({
                from: debtor.name, fromColor: debtor.text, to: creditor.name, toColor: creditor.text, amount: amountToTransfer
              });
            }

            debtor.remaining -= amountToTransfer;
            creditor.remaining -= amountToTransfer;

            if (debtor.remaining < 0.01) dIndex++;
            if (creditor.remaining < 0.01) cIndex++;
          }

          const totalTripCostUSD = expenses.reduce((acc, curr) => acc + curr.amount, 0);

          return { familySummaryList, memberSummary: Object.values(memberSummary), transfers, totalTripCostUSD };
        }, [expenses, allMembers]);

        const toggleCoveredMember = (mId) => {
          if (coveredMemberIds.includes(mId)) {
            setCoveredMemberIds(coveredMemberIds.filter(id => id !== mId));
          } else {
            setCoveredMemberIds([...coveredMemberIds, mId]);
          }
        };

        const toggleWholeFamilyScope = (familyId, isCurrentlySelected) => {
          const familyMemberIds = INITIAL_FAMILIES.find(f => f.id === familyId)?.members.map(m => m.id) || [];
          if (isCurrentlySelected) {
            setCoveredMemberIds(coveredMemberIds.filter(id => !familyMemberIds.includes(id)));
          } else {
            setCoveredMemberIds(Array.from(new Set([...coveredMemberIds, ...familyMemberIds])));
          }
        };

        const handleCustomAmountChange = (mId, value) => {
          setCustomAmounts(prev => ({ ...prev, [mId]: value }));
        };

        const formatFriendlyDate = (dateStr) => {
          if (!dateStr) return '';
          const parts = dateStr.split('-');
          if (parts.length !== 3) return dateStr;
          const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
          return `${months[parseInt(parts[1], 10) - 1] || parts[1]} ${parseInt(parts[2], 10)}`;
        };

        const currencySymbol = currency === 'USD' ? '$' : 'Sh';

        return (
          <div className="min-h-screen bg-slate-50 text-slate-900 pb-24">
            <header className="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-slate-100 shadow-sm px-4 py-3">
              <div className="max-w-md mx-auto flex justify-between items-center">
                <div className="flex items-center space-x-2">
                  <span className="text-2xl">🦁</span>
                  <div>
                    <h1 className="font-extrabold text-base leading-tight">Kenya Splitter</h1>
                    <p className="text-[10px] text-slate-400">Firebase Cloud Sync Active</p>
                  </div>
                </div>
                <div className="text-right flex items-center space-x-1">
                  <span className="text-[10px] bg-emerald-50 text-emerald-700 font-bold px-2.5 py-1 rounded-full flex items-center gap-1">
                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Cloud Live
                  </span>
                </div>
              </div>
            </header>

            <div className="max-w-md mx-auto px-4 mt-3">
              <div className="bg-white rounded-2xl p-3 shadow-sm border border-slate-100 flex justify-between items-center text-xs">
                <div className="flex items-center space-x-2">
                  <span className="text-base">💱</span>
                  <div>
                    <p className="font-bold text-slate-700">Kenyan Shilling Rate</p>
                  </div>
                </div>
                <div className="flex items-center space-x-1.5">
                  <span className="text-slate-400 font-bold">1 USD =</span>
                  <input
                    type="number"
                    value={exchangeRate}
                    step="0.01"
                    onChange={(e) => setExchangeRate(parseFloat(e.target.value) || 0)}
                    className="w-16 px-1.5 py-1 text-center font-bold text-slate-800 bg-slate-50 border border-slate-200 rounded"
                  />
                  <span className="font-bold text-slate-500">KES</span>
                  <button onClick={fetchLiveExchangeRate} className="p-1 hover:bg-slate-100 rounded-full">🔄</button>
                </div>
              </div>
            </div>

            <div className="max-w-md mx-auto px-4 mt-3">
              <div className="bg-gradient-to-br from-slate-900 via-slate-800 to-emerald-950 text-white rounded-3xl p-5 shadow-md">
                <p className="text-emerald-300 text-[10px] font-bold uppercase">Total Shared Trip Cost</p>
                <p className="text-3xl font-black mt-1">${calculations.totalTripCostUSD.toLocaleString(undefined, { minimumFractionDigits: 2 })} <span className="text-sm font-normal">USD</span></p>
              </div>
            </div>

            <main className="max-w-md mx-auto px-4 mt-4">
              {isLoading ? (
                <div className="text-center py-12">
                  <div className="inline-block w-8 h-8 border-4 border-slate-300 border-t-slate-800 rounded-full animate-spin"></div>
                  <p className="text-xs text-slate-400 mt-2">Connecting to KenyaKash database...</p>
                </div>
              ) : (
                <>
                  {activeTab === 'expenses' && (
                    <div className="space-y-5">
                      <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
                        <h2 className="font-bold text-base text-slate-800 mb-4">{editingExpenseId ? "📝 Edit Safari Activity" : "💸 Log Safari Activity"}</h2>
                        <form onSubmit={handleSubmitExpense} className="space-y-4">
                          <div>
                            <label className="block text-[10px] font-bold text-slate-400 uppercase">What did you pay for?</label>
                            <input type="text" value={description} onChange={(e) => setDescription(e.target.value)} required className="w-full px-4 py-3 bg-slate-50 border rounded-xl text-sm" placeholder="e.g. Game Drive Park Fees" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-bold text-slate-400 uppercase">Date</label>
                            <input type="date" value={activityDate} onChange={(e) => setActivityDate(e.target.value)} required className="w-full px-4 py-3 bg-slate-50 border rounded-xl text-sm" />
                          </div>
                          <div className="grid grid-cols-2 gap-2">
                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase">Currency</label>
                                                              <select value={currency} onChange={(e) => setCurrency(e.target.value)} className="w-full px-2 py-3 bg-slate-50 border rounded-xl text-xs font-bold">
                                <option value="USD">🇺🇸 USD ($)</option>
                                <option value="KES">🇰🇪 KES (Sh)</option>
                              </select>
                            </div>
                            <div>
                              <label className="block text-[10px] font-bold text-slate-400 uppercase">Paid By</label>
                              <select value={paidByMemberId} onChange={(e) => setPaidByMemberId(e.target.value)} className="w-full px-2 py-3 bg-slate-50 border rounded-xl text-xs">
                                {allMembers.map(m => (
                                  <option key={m.id} value={m.id}>{m.name}</option>
                                ))}
                              </select>
                            </div>
                          </div>

                          {/* Notes Text Area */}
                          <div>
                            <label className="block text-[10px] font-bold text-slate-400 uppercase">Notes (optional)</label>
                            <textarea value={notes} onChange={(e) => setNotes(e.target.value)} className="w-full px-4 py-2.5 bg-slate-50 border rounded-xl text-sm focus:outline-none" rows="2" placeholder="Describe lunch details, specific tickets bought, etc." />
                          </div>

                          <div>
                            <div className="bg-slate-100 p-1 rounded-xl flex space-x-1">
                              <button type="button" onClick={() => setSplitMode('equal')} className={`flex-1 py-2 text-xs font-extrabold rounded-lg ${splitMode === 'equal' ? 'bg-white text-slate-900' : 'text-slate-400'}`}>⚖️ Split Equally</button>
                              <button type="button" onClick={() => setSplitMode('custom')} className={`flex-1 py-2 text-xs font-extrabold rounded-lg ${splitMode === 'custom' ? 'bg-white text-slate-900' : 'text-slate-400'}`}>✏️ Custom</button>
                            </div>
                          </div>

                          {splitMode === 'equal' && (
                            <div className="space-y-3">
                              <input type="number" step="0.01" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0.00" className="w-full px-4 py-3 bg-slate-50 border rounded-xl text-sm font-black" />
                              <div className="space-y-3">
                                {INITIAL_FAMILIES.map(fam => {
                                  const familyMemberIds = fam.members.map(m => m.id);
                                  const selectedFamilyMembersCount = fam.members.filter(m => coveredMemberIds.includes(m.id)).length;
                                  const isSelected = selectedFamilyMembersCount > 0;

                                  return (
                                    <div key={fam.id} className={`p-3 rounded-2xl border ${fam.border} ${fam.bg}`}>
                                      <div className="flex justify-between items-center mb-2 pb-1 border-b border-white/60">
                                        <span className={`text-xs font-bold ${fam.text}`}>{fam.name}</span>
                                        {/* Dynamic Select/Deselect button restored */}
                                        <button
                                          type="button"
                                          onClick={() => toggleWholeFamilyScope(fam.id, isSelected)}
                                          className={`text-[9px] font-bold px-2 py-0.5 rounded-full border ${fam.text} bg-white`}
                                        >
                                          {isSelected ? "Deselect Family" : "Select Family"}
                                        </button>
                                      </div>
                                      <div className="grid grid-cols-2 gap-1">
                                        {fam.members.map(m => {
                                          const isChecked = coveredMemberIds.includes(m.id);
                                          return (
                                            <button key={m.id} type="button" onClick={() => toggleCoveredMember(m.id)} className={`p-2 rounded-xl text-xs border ${isChecked ? 'bg-white border-teal-400 text-teal-900' : 'bg-white/40 text-slate-400'}`}>
                                              {m.name}
                                            </button>
                                          );
                                        })}
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          )}

                          {splitMode === 'custom' && (
                            <div className="space-y-3">
                              {INITIAL_FAMILIES.map(fam => (
                                <div key={fam.id} className={`p-3 rounded-2xl border ${fam.border} ${fam.bg}`}>
                                  <p className="text-xs font-bold mb-2">{fam.name}</p>
                                  {fam.members.map(m => (
                                    <div key={m.id} className="flex justify-between items-center bg-white/60 p-2 rounded-xl mb-1">
                                      <span className="text-xs font-semibold">{m.name}</span>
                                      <input type="number" step="0.01" value={customAmounts[m.id] || ''} onChange={(e) => handleCustomAmountChange(m.id, e.target.value)} className="w-20 px-2 py-1 text-right text-xs rounded border" placeholder="0.00" />
                                    </div>
                                  ))}
                                </div>
                              ))}
                            </div>
                          )}

                          <button type="submit" className="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition">
                            {editingExpenseId ? "Update Expense" : "Save Expense"}
                          </button>
                        </form>
                      </div>

                      <div className="space-y-2">
                        <h3 className="font-bold text-sm text-slate-800">Trip Expenses ({expenses.length})</h3>
                        {expenses.length === 0 ? (
                          <p className="text-xs text-slate-400 text-center py-6">No expenses logged yet.</p>
                        ) : (
                          expenses.map(exp => (
                            <div key={exp.id} className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex justify-between items-start">
                              <div onClick={() => handleEditClick(exp)} className="cursor-pointer flex-1 pr-4">
                                <p className="font-bold text-slate-800 text-sm">{exp.description}</p>
                                <p className="text-[10px] text-slate-400 font-medium mb-1">{formatFriendlyDate(exp.activityDate)} • ${exp.amount.toFixed(2)} USD</p>
                                {/* Notes printed in the ledger card */}
                                {exp.notes && (
                                  <p className="text-xs text-slate-500 italic mt-1 bg-slate-50 p-2 rounded-lg border border-slate-100">
                                    " {exp.notes} "
                                  </p>
                                )}
                              </div>
                              <button onClick={() => handleDeleteExpense(exp.id)} className="text-slate-400 hover:text-red-500 p-1">🗑️</button>
                            </div>
                          ))
                        )}
                      </div>
                    </div>
                  )}

                  {activeTab === 'settlements' && (
                    <div className="space-y-5">
                      <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
                        <h3 className="font-bold text-base mb-4">Family Balances</h3>
                        {calculations.familySummaryList.map(summary => (
                          <div key={summary.id} className="mb-4 flex justify-between items-center">
                            <div>
                              <span className="font-bold text-sm">{summary.name}</span>
                              <p className="text-[10px] text-slate-400">Paid: ${summary.paid.toFixed(2)} | Owed: ${summary.owed.toFixed(2)}</p>
                            </div>
                            <span className={`text-sm font-bold ${summary.net >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                              {summary.net >= 0 ? `+ $${summary.net.toFixed(2)}` : `- $${Math.abs(summary.net).toFixed(2)}`}
                            </span>
                          </div>
                        ))}
                      </div>

                      <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
                        <h3 className="font-bold text-base mb-3">Easy Settle Up</h3>
                        {calculations.transfers.length === 0 ? (
                          <p className="text-xs text-slate-400 py-2">Everyone is perfectly settled up!</p>
                        ) : (
                          calculations.transfers.map((tx, idx) => (
                            <div key={idx} className="p-3 border rounded-xl text-xs flex justify-between items-center mb-2 bg-slate-50">
                              <span><strong className={tx.fromColor}>{tx.from}</strong> owes <strong className={tx.toColor}>{tx.to}</strong></span>
                              <strong className="text-slate-800">${tx.amount.toFixed(2)}</strong>
                            </div>
                          ))
                        )}
                      </div>
                    </div>
                  )}
                </>
              )}
            </main>

            {toastMessage && (
              <div className="fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-[11px] font-bold px-4 py-3 rounded-full shadow-lg z-50">{toastMessage}</div>
            )}

            <nav className="fixed bottom-0 left-0 right-0 z-40 bg-white border-t p-3 shadow-md">
              <div className="max-w-md mx-auto flex justify-around">
                <button onClick={() => setActiveTab('expenses')} className={`text-xs ${activeTab === 'expenses' ? 'text-emerald-600 font-bold' : 'text-slate-400'}`}>🧾 Payments</button>
                <button onClick={() => setActiveTab('settlements')} className={`text-xs ${activeTab === 'settlements' ? 'text-emerald-600 font-bold' : 'text-slate-400'}`}>📊 Balances & Settle</button>
              </div>
            </nav>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
